# PPT 实验 ②：immediate（每条更新立即聚合，与 buffered 对比异步形态）
# 差异：async_mode: immediate（缓冲与 buffer_target 逻辑不适用）
seed: 42
num_clients: 5
updates_per_client: 80
dataset: MNIST
data_dir: /home/kamila/SCAFL/data/mnist_smoke
non_iid: false
num_shards: 4
model: mlp
batch_size: 64
local_epochs: 1
local_lr: 0.01
momentum: 0.9
weight_decay: 0.0001
grad_clip: 5.0
server_lr: 0.3
async_mode: immediate
buffer_size: 2
staleness_weight: exp
staleness_lambda: 0.2
staleness_cutoff: 8
dynamic_control:
  enabled: true
  tau_min: 1
  tau_base: 8
  tau_max_limit: 32
  buffer_min: 1
  buffer_base: 2
  buffer_max: 32
  delay_ref: 1.0
  heter_ref: 1.0
  staleness_ref: 1.0
  tau_coeff_delay: 0.5
  tau_coeff_heter: 0.5
  tau_coeff_staleness: 0.5
  buffer_coeff_delay: 0.5
  buffer_coeff_heter: 0.5
  buffer_coeff_staleness: 0.5
eval_every: 1
log_root: /home/kamila/SCAFL/logs/ppt_prepared/02_immediate
device: cuda
