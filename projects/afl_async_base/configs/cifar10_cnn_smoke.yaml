# CIFAR-10 + 小 CNN 冒烟（数据集名与模型需匹配：RGB 用 cnn_small）
seed: 42
num_clients: 4
updates_per_client: 8

dataset: CIFAR10
data_dir: ./data/raw

non_iid: true
num_shards: 20

model: cnn_small
batch_size: 64
local_epochs: 1
local_lr: 0.05
momentum: 0.9
weight_decay: 0.0001
grad_clip: 5.0

server_lr: 0.5
async_mode: buffered
buffer_size: 4

policy:
  type: legacy
  min_select_size: 2
  select_size: 2
  max_select_size: 4
  V: 1.0

staleness_weight: exp
staleness_lambda: 0.2
staleness_cutoff: 6

dynamic_control:
  enabled: false

eval_every: 2
log_root: ./logs/afl_async_base
device: cpu
