# 最小 CUDA 冒烟：2 客户端 × 2 轮更新，验证 GPU 路径可跑通
seed: 1
num_clients: 2
updates_per_client: 2
dataset: MNIST
data_dir: /home/kamila/SCAFL/data/mnist_smoke
non_iid: false
num_shards: 4
model: mlp
batch_size: 64
local_epochs: 1
local_lr: 0.01
momentum: 0.9
weight_decay: 0.0001
grad_clip: 5.0
server_lr: 0.3
async_mode: buffered
buffer_size: 4
policy:
  type: legacy
staleness_weight: exp
staleness_lambda: 0.2
staleness_cutoff: 8
dynamic_control:
  enabled: false
heterogeneity:
  enabled: false
eval_every: 10
log_root: /home/kamila/SCAFL/logs/afl_cuda_smoke
device: cuda
