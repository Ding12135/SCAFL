# CIFAR-100 + cnn_small 冒烟（100 类，比 MNIST 更难、优化空间更大）
seed: 1
num_clients: 2
updates_per_client: 4

dataset: CIFAR100
data_dir: ./data/raw

non_iid: true
num_shards: 20

model: cnn_small
batch_size: 32
local_epochs: 1
local_lr: 0.05
momentum: 0.9
weight_decay: 0.0005
grad_clip: 5.0

server_lr: 0.5
async_mode: buffered
buffer_size: 2

policy:
  type: legacy
  min_select_size: 1
  select_size: 2
  max_select_size: 2
  V: 1.0

staleness_weight: exp
staleness_lambda: 0.2
staleness_cutoff: 8

dynamic_control:
  enabled: false

eval_every: 1
log_root: ./logs/afl_async_base
device: cpu
