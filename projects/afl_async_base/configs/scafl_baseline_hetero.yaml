# SC-AFL-like baseline：固定 tau_max（staleness_cutoff）+ 虚拟队列 + P2-like 子集选择；异构仅模拟时延。
#
# 相对「最小 smoke」的加强设定：便于实验中更常出现「缓冲内多条候选」「n>=min_select_size 下的
# 多前缀 P2 枚举」，以及在有未入选候选时让 virtual queue 有机会非零；训练使用 GPU（device: cuda）。
seed: 2025

num_clients: 6
updates_per_client: 40

dataset: MNIST
data_dir: /home/kamila/SCAFL/data/raw
non_iid: true
num_shards: 20

model: mlp
batch_size: 128
local_epochs: 1
local_lr: 0.005
momentum: 0.9
weight_decay: 0.0001
grad_clip: 5.0

server_lr: 0.3

async_mode: buffered
buffer_size: 16

staleness_weight: exp
staleness_lambda: 0.2
# 略放宽 τ，减少「单条即触顶被迫 flush」、利于多条同时在候选中再决策
staleness_cutoff: 12

dynamic_control:
  enabled: false

policy:
  type: scafl_p2
  V: 10.0
  # 至少 2 条候选才走完整 P2 前缀枚举；避免 n=1 时仅靠 force 单条 flush
  min_select_size: 2
  max_select_size: 12
  # 关闭：否则 n < min_select_size 时仍会对单条 incoming 强制 flush，弱化多候选与 buffer 形态
  force_select_ready: false

heterogeneity:
  enabled: true
  profile: moderate
  seed: 2025
  compute_delay_enabled: true
  upload_delay_enabled: true

logging:
  save_decision_debug: true
  save_queue_trace: true
  save_round_metrics: true

eval_every: 5
log_root: /home/kamila/SCAFL/logs/afl_async_base
device: cuda
