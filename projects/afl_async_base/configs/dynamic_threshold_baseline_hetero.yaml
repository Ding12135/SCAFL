# Optional: dynamic controller + heterogeneity (for comparison only)
seed: 2025
num_clients: 5
updates_per_client: 40
dataset: MNIST
data_dir: /home/kamila/SCAFL/data/raw
non_iid: true
num_shards: 20
model: mlp
batch_size: 128
local_epochs: 1
local_lr: 0.005
momentum: 0.9
weight_decay: 0.0001
grad_clip: 5.0
server_lr: 0.3
async_mode: buffered
buffer_size: 8
policy:
  type: dynamic_threshold
staleness_weight: exp
staleness_lambda: 0.2
staleness_cutoff: -1
dynamic_control:
  enabled: true
  tau_min: 2
  tau_base: 8
  tau_max_limit: 20
  buffer_min: 2
  buffer_base: 8
  buffer_max: 16
  delay_ref: 1.0
  heter_ref: 1.0
  staleness_ref: 8.0
  tau_coeff_delay: 0.5
  tau_coeff_heter: 0.5
  tau_coeff_staleness: 0.8
  buffer_coeff_delay: 0.5
  buffer_coeff_heter: 0.5
  buffer_coeff_staleness: 0.8
heterogeneity:
  enabled: true
  compute_delay_enabled: true
  upload_delay_enabled: true
eval_every: 5
log_root: /home/kamila/SCAFL/logs/afl_async_base
device: cuda
