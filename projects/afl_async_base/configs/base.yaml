# ===== Reproducibility =====
seed: 42

# ===== Federated setting =====
num_clients: 5
updates_per_client: 80

# ===== Dataset =====
# 支持：MNIST | FashionMNIST | CIFAR10 | CIFAR100 | SVHN |
#       EMNIST(=balanced,47类) | EMNIST_BYCLASS | EMNIST_DIGITS | EMNIST_LETTERS | EMNIST_MNIST | EMNIST_BYMERGE
dataset: MNIST
data_dir: /mnt/e/SCAFL/data/raw

# ===== Data partition =====
non_iid: true
num_shards: 20        # each client gets multiple shards (less extreme non-IID)

# ===== Model & training =====
# 灰度 28×28（MNIST/FashionMNIST）：mlp
# RGB 32×32（CIFAR10/SVHN）：cnn_small
model: mlp
batch_size: 128
local_epochs: 1
local_lr: 0.005
momentum: 0.9
weight_decay: 0.0001
grad_clip: 5.0

# ===== Async federated learning (server side) =====
server_lr: 0.3

# async_mode: immediate | buffered
async_mode: buffered
buffer_size: 8

# ===== Aggregation policy (buffered only; default legacy) =====
# type: legacy | scafl_skeleton | sorted_subset | queue_aware | approx_drift_penalty | scafl_p2
policy:
  type: legacy
  min_select_size: 4
  select_size: 4
  max_select_size: 6
  V: 1.0
  # queue_aware 专用：alpha/beta 为 priority = beta*q_norm - alpha*d_norm
  alpha: 1.0
  beta: 1.0

# ===== Staleness control =====
staleness_weight: exp     # none | inv | exp
staleness_lambda: 0.2
staleness_cutoff: 8

# ===== Dynamic control (first-innovation-point Step2) =====
dynamic_control:
  enabled: true
  # tau control range
  tau_min: 1
  tau_base: 8
  tau_max_limit: 32
  # buffer target range
  buffer_min: 1
  buffer_base: 8
  buffer_max: 32
  # normalization refs
  delay_ref: 1.0
  heter_ref: 1.0
  staleness_ref: 1.0
  # linear coefficients for tau: tau_raw = tau_base - sum(coeff * score)
  tau_coeff_delay: 0.5
  tau_coeff_heter: 0.5
  tau_coeff_staleness: 0.5
  # linear coefficients for buffer: buffer_raw = buffer_base - sum(coeff * score)
  buffer_coeff_delay: 0.5
  buffer_coeff_heter: 0.5
  buffer_coeff_staleness: 0.5

# ===== Edge device status modeling (server-side proxy, paper-aligned) =====
# 说明：当前不接端侧真实状态时，服务端根据 compute/upload 与模型更新 payload 递推估计：
# cpu_util, battery_soc, bandwidth, rtt, loss, temperature, memory。
edge_state_model:
  enabled: true
  dt_s: 1.0
  ewma_alpha: 0.85
  # CPU proxy: T_cmp ~= cycles / f
  cpu_cycles_per_sample: 2000000.0
  cpu_freq_min_ghz: 0.4
  cpu_freq_max_ghz: 3.2
  cpu_floor: 0.02
  # Network proxy: upload payload comes from real delta tensor size
  downlink_payload_ratio: 1.0
  min_delay_s: 0.001
  bw_ul_min_mbps: 0.2
  bw_ul_max_mbps: 300.0
  bw_dl_min_mbps: 0.2
  bw_dl_max_mbps: 600.0
  rtt_floor_ms: 8.0
  rtt_upload_coeff_ms: 120.0
  # Loss (logistic)
  loss_bias: -3.0
  loss_rtt_coeff: 1.1
  loss_bw_coeff: 0.8
  loss_bw_ref_mbps: 10.0
  loss_cap: 0.6
  # Energy/Battery
  kappa_cpu: 0.18
  tx_power_w: 1.3
  rx_power_w: 1.0
  base_power_w: 0.6
  battery_mah: 4500.0
  battery_v: 3.85
  # Thermal
  ambient_temp_c: 28.0
  thermal_tau_s: 120.0
  thermal_eta: 0.04
  max_temp_c: 52.0
  # Memory proxy
  mem_base: 0.25
  mem_cpu_coeff: 0.55
  mem_batch_coeff: 0.20
  mem_sample_ref: 1024.0

# ===== Evaluation & logging =====
eval_every: 5
log_root: /home/kamila/SCAFL/logs/afl_async_base

# ===== Device =====
device: cuda
