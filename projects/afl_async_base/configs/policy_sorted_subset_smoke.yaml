# 最小验证：sorted_subset 子集聚合（需与 smoke 相同 data_dir / device）
# 期望：round_metrics 中 candidate_count >= min_select_size 时 flush，
#       selected_count == min(select_size, candidate_count)，
#       unselected_count > 0 当 candidate_count > select_size。
seed: 42
num_clients: 4
updates_per_client: 20
dataset: MNIST
data_dir: /home/kamila/SCAFL/data/mnist_smoke
non_iid: false
num_shards: 4
model: mlp
batch_size: 64
local_epochs: 1
local_lr: 0.01
momentum: 0.9
weight_decay: 0.0001
grad_clip: 5.0
server_lr: 0.3
async_mode: buffered
buffer_size: 99
staleness_weight: exp
staleness_lambda: 0.2
staleness_cutoff: 12
dynamic_control:
  enabled: false
eval_every: 1
log_root: /home/kamila/SCAFL/logs/policy_sorted_subset_smoke
device: cpu

policy:
  type: sorted_subset
  min_select_size: 4
  select_size: 2
